name: Update CricHeroes Stats

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse and validate but do not commit"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    name: Download & patch SGIA + BPL stats
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Playwright system dependencies
        working-directory: scripts
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        working-directory: scripts
        run: npx playwright install chromium

      - name: Run CricHeroes stats updater
        working-directory: scripts
        run: npm run update:cricheroes
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Check for JSON changes
        id: check_changes
        run: |
          CHANGED_FILES=""

          for f in cricsearch-sg/src/data/sgiaStats.json cricsearch-sg/src/data/bplStats.json; do
            if ! git diff --quiet "$f"; then
              CHANGED_FILES="$CHANGED_FILES $f"
              echo "Changed: $f"
              git diff --stat "$f"
            fi
          done

          if [ -n "$CHANGED_FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          fi

      - name: Commit and push updated stats
        if: >
          steps.check_changes.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cricsearch-sg/src/data/sgiaStats.json cricsearch-sg/src/data/bplStats.json
          git commit -m "chore: update CricHeroes stats from leaderboards"
          git push

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cricheroes-debug-screenshots
          path: |
            scripts/tmp/sgia/*.png
            scripts/tmp/bpl/*.png
          if-no-files-found: ignore
          retention-days: 7
