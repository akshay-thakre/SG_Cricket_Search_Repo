name: Update CricHeroes Stats

on:
  schedule:
    # 22:00 UTC = 06:00 Singapore time (SGT = UTC+8)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse and validate but do not commit"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # required to push sgiaStats.json and bplStats.json back to main

jobs:
  update-stats:
    name: Download & patch SGIA + BPL stats
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN is sufficient unless main has required PR reviews.
          # If pushes are blocked, store a PAT as secrets.DEPLOY_PAT and use:
          #   token: ${{ secrets.DEPLOY_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      # ── Script dependencies ────────────────────────────────────────────────
      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      # ── Playwright system deps + browser ──────────────────────────────────
      - name: Install Playwright system dependencies
        working-directory: scripts
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        working-directory: scripts
        run: npx playwright install chromium

      # ── Run updater ────────────────────────────────────────────────────────
      - name: Run CricHeroes stats updater
        working-directory: scripts
        run: node update-cricheroes-stats.js
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      # ── Detect changes ─────────────────────────────────────────────────────
      - name: Check for JSON changes
        id: check_changes
        run: |
          CHANGED_FILES=""
          for f in cricsearch-sg/src/data/sgiaStats.json cricsearch-sg/src/data/bplStats.json; do
            if ! git diff --quiet "$f"; then
              CHANGED_FILES="$CHANGED_FILES $f"
              echo "Changed: $f"
              git diff --stat "$f"
            fi
          done

          if [ -n "$CHANGED_FILES" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in any stats JSON."
          fi

      # ── Commit & push ──────────────────────────────────────────────────────
      - name: Commit and push updated stats
        if: >
          steps.check_changes.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cricsearch-sg/src/data/sgiaStats.json cricsearch-sg/src/data/bplStats.json
          git commit -m "chore: update CricHeroes stats from leaderboards"
          git push

      # ── Job summary ────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "### ✅ Stats updated" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed files:${{ steps.check_changes.outputs.files }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ No changes — stats already up to date" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Debug artifacts on failure ─────────────────────────────────────────
      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cricheroes-debug-screenshots
          path: |
            tmp/sgia/*.png
            tmp/bpl/*.png
          if-no-files-found: ignore
          retention-days: 7
