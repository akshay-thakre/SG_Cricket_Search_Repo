name: Update SGIA Stats

on:
  schedule:
    # 22:00 UTC = 06:00 Singapore time (SGT = UTC+8)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (parse and validate but do not commit changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # required to commit and push sgiaStats.json back to main

jobs:
  update-sgia-stats:
    name: Download & patch sgiaStats.json
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the built-in GITHUB_TOKEN so the job can push back to main.
          # If main has branch protection requiring PR reviews, replace this
          # with a PAT stored in a secret (e.g. secrets.DEPLOY_PAT).
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      # ── Script dependencies ────────────────────────────────────────────────
      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      # ── Playwright system deps + browser ──────────────────────────────────
      - name: Install Playwright system dependencies
        working-directory: scripts
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        working-directory: scripts
        run: npx playwright install chromium

      # ── Run updater ────────────────────────────────────────────────────────
      - name: Run SGIA stats updater
        working-directory: scripts
        run: node update-sgia-stats.js
        env:
          # Expose dry-run flag for potential future use in the script
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      # ── Detect changes ─────────────────────────────────────────────────────
      - name: Check if sgiaStats.json changed
        id: check_changes
        run: |
          if git diff --quiet cricsearch-sg/src/data/sgiaStats.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in sgiaStats.json."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in sgiaStats.json."
            git diff --stat cricsearch-sg/src/data/sgiaStats.json
          fi

      # ── Commit & push (only when data changed and not a dry run) ──────────
      - name: Commit and push updated stats
        if: >
          steps.check_changes.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cricsearch-sg/src/data/sgiaStats.json
          git commit -m "chore: update SGIA stats from CricHeroes"
          git push

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "### ✅ sgiaStats.json updated" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ No changes — sgiaStats.json already up to date" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Upload debug screenshots on failure ────────────────────────────────
      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sgia-debug-screenshots
          path: tmp/sgia/*.png
          if-no-files-found: ignore
          retention-days: 7
